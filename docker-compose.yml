services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chicaboo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chicaboo}
      POSTGRES_DB: ${POSTGRES_DB:-chicaboo}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chicaboo} -d ${POSTGRES_DB:-chicaboo}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: python:3.12-slim
    working_dir: /database
    volumes:
      - ./database:/database
    env_file:
      - ./database/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chicaboo}:${POSTGRES_PASSWORD:-chicaboo}@postgres:5432/${POSTGRES_DB:-chicaboo}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "pip install -q -r requirements.txt && python migrate.py migrate"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chicaboo}:${POSTGRES_PASSWORD:-chicaboo}@postgres:5432/${POSTGRES_DB:-chicaboo}
      REDIS_URL: redis://redis:6379
      JWT_PRIVATE_KEY_PATH: /app/keys/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
      PORT: "8000"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
